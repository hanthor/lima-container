<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lima VM Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0/lib/addon-web-links.min.js"></script>
</head>
<body>
  <header>
    <h1>Lima VM Manager</h1>
    <div style="display:flex;gap:0.5rem;">
      <button id="btn-bootc" class="btn btn-secondary hidden">Build from bootc image</button>
      <button id="btn-create" class="btn btn-primary">+ Create VM</button>
    </div>
  </header>

  <div id="toast-area"></div>

  <main>
    <div id="instance-list" class="instance-grid">
      <p class="placeholder">Loading instances…</p>
    </div>

    <section id="bootc-section" class="hidden" style="margin-top:2rem;">
      <h2 style="font-size:1rem;font-weight:600;margin-bottom:0.75rem;color:var(--text-muted);">bootc Builds</h2>
      <div id="bootc-builds-list" class="instance-grid"></div>
    </section>
  </main>

  <!-- bootc Modal -->
  <div id="bootc-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Build from bootc image</h2>
        <button class="btn-icon" id="bootc-modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label for="bootc-image-input">Container image URI</label>
        <input type="text" id="bootc-image-input" placeholder="quay.io/fedora/fedora-bootc:42"
               style="padding:0.5rem 0.65rem;font-size:0.9rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);outline:none;width:100%;">
        <label for="bootc-name-input" style="margin-top:0.5rem;">VM name (optional)</label>
        <input type="text" id="bootc-name-input" placeholder="auto-generated"
               style="padding:0.5rem 0.65rem;font-size:0.9rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);outline:none;width:100%;">

        <!-- Customizations -->
        <details style="margin-top:1rem;">
          <summary style="cursor:pointer;font-weight:600;font-size:0.9rem;color:var(--text-muted);user-select:none;">
            Customizations (optional)
          </summary>
          <div style="margin-top:0.75rem;display:flex;flex-direction:column;gap:0.5rem;">
            <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.9rem;">
              <input type="checkbox" id="bootc-ssh-check"> Enable SSH (install &amp; enable sshd)
            </label>
            <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.9rem;">
              <input type="checkbox" id="bootc-rdp-check"> Enable RDP (install &amp; enable xrdp)
            </label>
            <label for="bootc-packages-input" style="font-size:0.9rem;margin-top:0.25rem;">Extra packages (space-separated)</label>
            <input type="text" id="bootc-packages-input" placeholder="vim curl htop"
                   style="padding:0.5rem 0.65rem;font-size:0.9rem;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);outline:none;width:100%;">
            <label for="bootc-containerfile-input" style="font-size:0.9rem;margin-top:0.25rem;">Custom Containerfile instructions (advanced)</label>
            <textarea id="bootc-containerfile-input" rows="4" placeholder="RUN echo 'hello' > /etc/motd"
                      style="padding:0.5rem 0.65rem;font-size:0.85rem;font-family:monospace;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);outline:none;width:100%;resize:vertical;"></textarea>
          </div>
        </details>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="bootc-btn-cancel">Cancel</button>
        <button class="btn btn-primary" id="bootc-btn-submit">Start Build</button>
      </div>
    </div>
  </div>

  <!-- Create VM Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Create VM</h2>
        <button id="modal-close" class="btn-icon" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <label for="template-select">Template</label>
        <select id="template-select">
          <option value="">Loading templates…</option>
        </select>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel" class="btn btn-secondary">Cancel</button>
        <button id="btn-submit-create" class="btn btn-primary">Create</button>
      </div>
      <div id="create-status" class="create-status hidden">
        <div class="spinner"></div>
        <span>Creating instance — this may take a few minutes…</span>
      </div>
    </div>
  </div>

  <!-- Terminal Modal -->
  <div id="terminal-modal-overlay" class="terminal-overlay hidden">
    <div class="terminal-modal">
      <div class="terminal-modal-header">
        <span class="terminal-modal-title" id="terminal-modal-title">Terminal</span>
        <button class="btn-icon" id="terminal-modal-close">✕</button>
      </div>
      <div class="terminal-modal-body" id="terminal-container"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
