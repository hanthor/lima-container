<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDP — Lima Container</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
        sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    /* ── Toolbar ───────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.4rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 40px;
      flex-shrink: 0;
      z-index: 10;
      transition: opacity 0.3s;
    }

    #toolbar.toolbar-hidden {
      opacity: 0;
      pointer-events: none;
    }

    #toolbar:hover { opacity: 1; pointer-events: auto; }

    #status {
      font-size: 0.8rem;
      font-weight: 600;
      flex: 1;
    }

    #status.connected { color: var(--green); }
    #status.error { color: var(--red); }
    #status.connecting { color: var(--accent); }

    .toolbar-btn {
      padding: 0.25rem 0.65rem;
      font-size: 0.8rem;
      font-family: var(--font);
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }
    .toolbar-btn:hover { background: #1c2230; }
    .toolbar-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Canvas ────────────────────────────────────────── */
    #rdp-canvas {
      display: block;
      background: #000;
      outline: none;
    }

    #rdp-canvas.active { cursor: none; }

    /* ── Connection Form Overlay ───────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .overlay.hidden { display: none; }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 90%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
    }

    .form-card .instance-name {
      text-align: center;
      font-size: 0.85rem;
      color: var(--accent);
      margin-top: -0.5rem;
    }

    .form-card input {
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      width: 100%;
    }

    .form-card input:focus { border-color: var(--accent); }

    .form-card input::placeholder { color: var(--text-muted); }

    #connect-btn {
      padding: 0.6rem;
      font-size: 0.9rem;
      font-family: var(--font);
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #000;
      cursor: pointer;
      transition: background 0.15s;
    }
    #connect-btn:hover { background: #79c0ff; }
    #connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-error {
      font-size: 0.8rem;
      color: var(--red);
      text-align: center;
      min-height: 1.2em;
    }

    /* ── Error Banner ─────────────────────────────────── */
    #error-banner {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      z-index: 20;
      max-width: 90%;
      text-align: center;
    }

    #error-banner.hidden { display: none; }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <span id="status">Disconnected</span>
    <button class="toolbar-btn" id="fullscreen-btn" title="Toggle fullscreen">⛶ Fullscreen</button>
    <button class="toolbar-btn" id="hide-toolbar-btn" title="Hide toolbar (hover top to show)">▴ Hide</button>
    <button class="toolbar-btn" id="disconnect-btn" disabled>Disconnect</button>
  </div>

  <!-- RDP Canvas -->
  <canvas id="rdp-canvas" tabindex="0"></canvas>

  <!-- Connection Form -->
  <div id="connect-form" class="overlay">
    <div class="form-card">
      <h2>RDP Connection</h2>
      <div class="instance-name" id="form-instance-name"></div>
      <input id="rdp-user" type="text" placeholder="Username" value="lima" autocomplete="username">
      <input id="rdp-pass" type="password" placeholder="Password" autocomplete="current-password">
      <div class="form-error" id="form-error"></div>
      <button id="connect-btn">Connect</button>
    </div>
  </div>

  <!-- Error Banner (shown on fatal errors) -->
  <div id="error-banner" class="hidden"></div>

  <script type="module">
    // ── DOM References ──────────────────────────────────────
    const canvas = document.getElementById('rdp-canvas');
    const toolbar = document.getElementById('toolbar');
    const statusEl = document.getElementById('status');
    const connectForm = document.getElementById('connect-form');
    const formInstanceName = document.getElementById('form-instance-name');
    const userInput = document.getElementById('rdp-user');
    const passInput = document.getElementById('rdp-pass');
    const formError = document.getElementById('form-error');
    const connectBtn = document.getElementById('connect-btn');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const hideToolbarBtn = document.getElementById('hide-toolbar-btn');
    const errorBanner = document.getElementById('error-banner');

    // ── Parse URL Parameters ────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const instance = params.get('instance') || '';
    const autoUser = params.get('username') || '';
    const autoPass = params.get('password') || '';

    if (instance) {
      formInstanceName.textContent = instance;
      document.title = `RDP — ${instance}`;
    }

    // Prefill credentials: URL params take priority, then localStorage
    if (autoUser) {
      userInput.value = autoUser;
    } else {
      const savedUser = localStorage.getItem(`rdp-user-${instance}`);
      if (savedUser) userInput.value = savedUser;
    }
    if (autoPass) {
      passInput.value = autoPass;
    }

    // Auto-connect if credentials were provided via URL
    if (autoUser && autoPass) {
      connect(autoUser, autoPass);
    }

    // ── PS/2 Set 1 Scancode Map ─────────────────────────────
    const SCANCODE_MAP = {
      'Escape': 0x01,
      'Digit1': 0x02,
      'Digit2': 0x03,
      'Digit3': 0x04,
      'Digit4': 0x05,
      'Digit5': 0x06,
      'Digit6': 0x07,
      'Digit7': 0x08,
      'Digit8': 0x09,
      'Digit9': 0x0A,
      'Digit0': 0x0B,
      'Minus': 0x0C,
      'Equal': 0x0D,
      'Backspace': 0x0E,
      'Tab': 0x0F,
      'KeyQ': 0x10,
      'KeyW': 0x11,
      'KeyE': 0x12,
      'KeyR': 0x13,
      'KeyT': 0x14,
      'KeyY': 0x15,
      'KeyU': 0x16,
      'KeyI': 0x17,
      'KeyO': 0x18,
      'KeyP': 0x19,
      'BracketLeft': 0x1A,
      'BracketRight': 0x1B,
      'Enter': 0x1C,
      'ControlLeft': 0x1D,
      'KeyA': 0x1E,
      'KeyS': 0x1F,
      'KeyD': 0x20,
      'KeyF': 0x21,
      'KeyG': 0x22,
      'KeyH': 0x23,
      'KeyJ': 0x24,
      'KeyK': 0x25,
      'KeyL': 0x26,
      'Semicolon': 0x27,
      'Quote': 0x28,
      'Backquote': 0x29,
      'ShiftLeft': 0x2A,
      'Backslash': 0x2B,
      'KeyZ': 0x2C,
      'KeyX': 0x2D,
      'KeyC': 0x2E,
      'KeyV': 0x2F,
      'KeyB': 0x30,
      'KeyN': 0x31,
      'KeyM': 0x32,
      'Comma': 0x33,
      'Period': 0x34,
      'Slash': 0x35,
      'ShiftRight': 0x36,
      'NumpadMultiply': 0x37,
      'AltLeft': 0x38,
      'Space': 0x39,
      'CapsLock': 0x3A,
      'F1': 0x3B,
      'F2': 0x3C,
      'F3': 0x3D,
      'F4': 0x3E,
      'F5': 0x3F,
      'F6': 0x40,
      'F7': 0x41,
      'F8': 0x42,
      'F9': 0x43,
      'F10': 0x44,
      'NumLock': 0x45,
      'ScrollLock': 0x46,
      'Numpad7': 0x47,
      'Numpad8': 0x48,
      'Numpad9': 0x49,
      'NumpadSubtract': 0x4A,
      'Numpad4': 0x4B,
      'Numpad5': 0x4C,
      'Numpad6': 0x4D,
      'NumpadAdd': 0x4E,
      'Numpad1': 0x4F,
      'Numpad2': 0x50,
      'Numpad3': 0x51,
      'Numpad0': 0x52,
      'NumpadDecimal': 0x53,
      'IntlBackslash': 0x56,
      'F11': 0x57,
      'F12': 0x58,
      // Extended keys (0xE0 prefix)
      'NumpadEnter': 0xE01C,
      'ControlRight': 0xE01D,
      'NumpadDivide': 0xE035,
      'PrintScreen': 0xE037,
      'AltRight': 0xE038,
      'Home': 0xE047,
      'ArrowUp': 0xE048,
      'PageUp': 0xE049,
      'ArrowLeft': 0xE04B,
      'ArrowRight': 0xE04D,
      'End': 0xE04F,
      'ArrowDown': 0xE050,
      'PageDown': 0xE051,
      'Insert': 0xE052,
      'Delete': 0xE053,
      'MetaLeft': 0xE05B,
      'MetaRight': 0xE05C,
      'ContextMenu': 0xE05D,
      'Pause': 0xE11D,
    };

    // Mouse button mapping: DOM button index → RDP button flag
    const MOUSE_BUTTON_MAP = {
      0: 0, // left
      1: 2, // middle
      2: 1, // right
    };

    // ── State ───────────────────────────────────────────────
    let session = null;
    let canvasFocused = false;
    let ironrdpLoaded = false;

    // IronRDP module references (populated after import)
    let wasmInit, wasmSetup, SessionBuilder, DesktopSize, InputTransaction, DeviceEvent, Extension;

    // ── Canvas Sizing ───────────────────────────────────────
    function resizeCanvas() {
      const toolbarHeight = toolbar.classList.contains('toolbar-hidden') ? 0 : toolbar.offsetHeight;
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight - toolbarHeight;
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Status Helpers ──────────────────────────────────────
    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || '';
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove('hidden');
    }

    function hideError() {
      errorBanner.classList.add('hidden');
    }

    // ── Load IronRDP WASM ───────────────────────────────────
    async function loadWasm() {
      try {
        const mod = await import('/rdp/pkg/rdp_client.js');
        wasmInit = mod.default;
        wasmSetup = mod.setup;
        SessionBuilder = mod.SessionBuilder;
        DesktopSize = mod.DesktopSize;
        InputTransaction = mod.InputTransaction;
        DeviceEvent = mod.DeviceEvent;
        Extension = mod.Extension;

        await wasmInit();
        wasmSetup('info');
        ironrdpLoaded = true;
        console.log('IronRDP WASM loaded');
      } catch (err) {
        console.error('Failed to load IronRDP WASM:', err);
        formError.textContent = 'WASM not available. Run scripts/fetch-ironrdp-wasm.sh first.';
        connectBtn.disabled = true;
        setStatus('WASM not loaded', 'error');
      }
    }

    // ── Connect ─────────────────────────────────────────────
    async function connect(username, password) {
      if (!ironrdpLoaded) {
        formError.textContent = 'IronRDP WASM is not loaded';
        return;
      }

      const targetInstance = instance;
      if (!targetInstance) {
        formError.textContent = 'No instance specified (use ?instance=name)';
        return;
      }

      formError.textContent = '';
      connectBtn.disabled = true;
      setStatus('Connecting…', 'connecting');

      try {
        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const proxyUrl = `${wsProto}//${location.host}/rdp/proxy/${encodeURIComponent(targetInstance)}`;

        resizeCanvas();

        const desktopSize = new DesktopSize(canvas.width, canvas.height);

        session = new SessionBuilder()
          .proxyAddress(proxyUrl)
          .destination('127.0.0.1:3389')
          .serverDomain('')
          .username(username)
          .password(password)
          .authToken('none')
          .desktopSize(desktopSize)
          .renderCanvas(canvas)
          .build();

        // Save username for convenience
        localStorage.setItem(`rdp-user-${instance}`, username);

        // Hide form, show canvas
        connectForm.classList.add('hidden');
        disconnectBtn.disabled = false;
        canvas.focus();
        canvasFocused = true;

        setStatus('Connected', 'connected');

        // Run the session (blocks until disconnected)
        await session.run();

        setStatus('Disconnected', '');
        onDisconnected('Session ended');
      } catch (err) {
        console.error('RDP connection error:', err);
        const msg = err.message || String(err);
        setStatus('Connection failed', 'error');
        onDisconnected(msg);
      }
    }

    function onDisconnected(reason) {
      session = null;
      disconnectBtn.disabled = true;
      canvasFocused = false;
      canvas.classList.remove('active');
      connectForm.classList.remove('hidden');
      if (reason) {
        formError.textContent = reason;
      }
    }

    function disconnect() {
      if (session) {
        try { session.shutdown(); } catch (_) {}
        session = null;
      }
      setStatus('Disconnected', '');
      onDisconnected('');
    }

    // ── Input: Keyboard ─────────────────────────────────────
    function getScancode(code) {
      return SCANCODE_MAP[code] || 0;
    }

    function sendKeyEvent(e, pressed) {
      if (!session || !canvasFocused) return;

      const scancode = getScancode(e.code);
      if (!scancode) return;

      e.preventDefault();
      e.stopPropagation();

      try {
        const tx = InputTransaction.new();
        if (pressed) {
          tx.addEvt(DeviceEvent.keyPressed(scancode));
        } else {
          tx.addEvt(DeviceEvent.keyReleased(scancode));
        }
        session.applyInputs(tx);
      } catch (err) {
        console.warn('Key input error:', err);
      }
    }

    document.addEventListener('keydown', (e) => sendKeyEvent(e, true));
    document.addEventListener('keyup', (e) => sendKeyEvent(e, false));

    // ── Input: Mouse ────────────────────────────────────────
    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: Math.round(e.clientX - rect.left),
        y: Math.round(e.clientY - rect.top),
      };
    }

    canvas.addEventListener('mousemove', (e) => {
      if (!session || !canvasFocused) return;
      const { x, y } = getCanvasCoords(e);
      try {
        const tx = InputTransaction.new();
        tx.addEvt(DeviceEvent.mouseMove(x, y));
        session.applyInputs(tx);
      } catch (err) {
        console.warn('Mouse move error:', err);
      }
    });

    canvas.addEventListener('mousedown', (e) => {
      if (!session) return;
      canvasFocused = true;
      canvas.classList.add('active');
      e.preventDefault();

      const { x, y } = getCanvasCoords(e);
      const button = MOUSE_BUTTON_MAP[e.button];
      if (button === undefined) return;

      try {
        const tx = InputTransaction.new();
        tx.addEvt(DeviceEvent.mouseButtonPressed(button));
        session.applyInputs(tx);
      } catch (err) {
        console.warn('Mouse down error:', err);
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (!session || !canvasFocused) return;
      e.preventDefault();

      const button = MOUSE_BUTTON_MAP[e.button];
      if (button === undefined) return;

      try {
        const tx = InputTransaction.new();
        tx.addEvt(DeviceEvent.mouseButtonReleased(button));
        session.applyInputs(tx);
      } catch (err) {
        console.warn('Mouse up error:', err);
      }
    });

    canvas.addEventListener('wheel', (e) => {
      if (!session || !canvasFocused) return;
      e.preventDefault();

      // Normalize delta to discrete rotation steps
      const vertical = e.deltaY !== 0;
      const value = vertical ? e.deltaY : e.deltaX;
      const rotations = value > 0 ? -1 : 1;

      try {
        const tx = InputTransaction.new();
        tx.addEvt(DeviceEvent.wheelRotations(vertical, rotations));
        session.applyInputs(tx);
      } catch (err) {
        console.warn('Wheel error:', err);
      }
    }, { passive: false });

    // Prevent context menu on canvas
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // Canvas focus management
    canvas.addEventListener('click', () => {
      canvasFocused = true;
      canvas.classList.add('active');
      canvas.focus();
    });

    document.addEventListener('click', (e) => {
      if (e.target !== canvas && !canvas.contains(e.target)) {
        canvasFocused = false;
        canvas.classList.remove('active');
      }
    });

    // ── Toolbar Buttons ─────────────────────────────────────
    disconnectBtn.addEventListener('click', disconnect);

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });

    document.addEventListener('fullscreenchange', () => {
      resizeCanvas();
    });

    hideToolbarBtn.addEventListener('click', () => {
      toolbar.classList.toggle('toolbar-hidden');
      resizeCanvas();
    });

    // ── Connect Form Handlers ───────────────────────────────
    connectBtn.addEventListener('click', () => {
      const user = userInput.value.trim();
      const pass = passInput.value;
      if (!user) {
        formError.textContent = 'Username is required';
        return;
      }
      connect(user, pass);
    });

    passInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connectBtn.click();
    });

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') passInput.focus();
    });

    // ── Init ────────────────────────────────────────────────
    loadWasm();
  </script>
</body>
</html>
