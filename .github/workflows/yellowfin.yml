name: Build yellowfin

on:
  push:
    branches: [main]
    paths:
      - 'images/yellowfin/**'
  pull_request:
    paths:
      - 'images/yellowfin/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push yellowfin:gnome50
        uses: docker/build-push-action@v6
        with:
          context: images/yellowfin
          file: images/yellowfin/Containerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/tuna-os/yellowfin:gnome50
          cache-from: type=gha
          cache-to: type=gha,mode=max
