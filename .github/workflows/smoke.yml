name: Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t lima-qemu:smoke .
      - name: Run container and verify noVNC endpoint
        run: |
          docker run -d --name smoke -p 18006:8006 lima-qemu:smoke
          sleep 5
          curl -fsS http://127.0.0.1:18006/vnc.html >/dev/null
          docker logs smoke | tail -n 50 || true
          docker rm -f smoke
