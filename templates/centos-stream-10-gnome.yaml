# CentOS Stream 10 desktop test template for GUI validation over noVNC + RDP.
images:
  - location: "https://cloud.centos.org/centos/10-stream/x86_64/images/CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2"
    arch: "x86_64"
  - location: "https://cloud.centos.org/centos/10-stream/aarch64/images/CentOS-Stream-GenericCloud-10-latest.aarch64.qcow2"
    arch: "aarch64"

cpus: 4
memory: "8GiB"
disk: "40GiB"

# Use legacy BIOS (SeaBIOS) instead of UEFI so that Lima does not require a
# writable OVMF_VARS pflash file, which it omits when only OVMF_CODE is found.
# SeaBIOS respects -boot order=c and boots from virtio disk directly.
firmware:
  legacyBIOS: true

mounts:
  - location: "/workspace"
    writable: true

video:
  display: "vnc"

# Forward RDP port so the container can proxy to it
portForwards:
  - guestPort: 3389
    hostPort: 3389
    proto: tcp

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      dnf makecache
      dnf group install -y "Server with GUI"
      dnf install -y firefox gnome-remote-desktop
      systemctl set-default graphical.target
      systemctl enable gdm
      systemctl isolate graphical.target
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      # Set a login password for the desktop session
      echo "lima:lima" | chpasswd

      # Configure GNOME Remote Desktop RDP in system mode (no GNOME keyring needed).
      # Generate a self-signed TLS certificate for RDP.
      CERT_DIR=/etc/gnome-remote-desktop
      mkdir -p "$CERT_DIR"
      openssl req -new -x509 -days 3650 -nodes \
        -out "$CERT_DIR/rdp-tls.crt" \
        -keyout "$CERT_DIR/rdp-tls.key" \
        -subj "/CN=lima-rdp"
      chown gnome-remote-desktop:gnome-remote-desktop \
        "$CERT_DIR/rdp-tls.crt" "$CERT_DIR/rdp-tls.key"

      grdctl --system rdp enable
      grdctl --system rdp set-tls-cert "$CERT_DIR/rdp-tls.crt"
      grdctl --system rdp set-tls-key "$CERT_DIR/rdp-tls.key"
      grdctl --system rdp set-credentials lima lima
      grdctl --system rdp disable-view-only
      systemctl enable gnome-remote-desktop