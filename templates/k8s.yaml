# Kubernetes-oriented Lima template for dev/test workloads.
images:
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "8GiB"
disk: "50GiB"

mounts:
  - location: "/workspace"
    writable: true

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -eux
      apt-get update
      apt-get install -y curl
      curl -sfL https://get.k3s.io | sh -

video:
  display: "vnc"
